<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>用起来 · 闲置物品盘活原型</title>
<meta name="theme-color" content="#D9B3AE">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="用起来">
<meta name="mobile-web-app-capable" content="yes">
<style>
  
  :root{
    --bg:#F5F1EC; --card:#FFFFFF; --ink:#6B635C; --sub:#A89C92;
    --brand:#D9B3AE; --brand2:#A7C0BC; --accent:#DCC79A; --green:#A9C2A4;
    --line:#EAE3DB;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:#ECE6DE;color:var(--ink);display:flex;justify-content:center;}
  .phone{width:100%;max-width:420px;min-height:100vh;background:var(--bg);
    position:relative;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.15);}
  header{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;
    padding:18px 18px 14px;}
  header h1{margin:0;font-size:20px;letter-spacing:1px;}
  header p{margin:4px 0 0;font-size:12px;opacity:.9;}
  .stats{display:flex;gap:8px;margin-top:12px;}
  .stat{flex:1;background:rgba(255,255,255,.18);border-radius:12px;padding:8px;text-align:center;}
  .stat b{display:block;font-size:18px;}
  .stat span{font-size:11px;opacity:.9;}
  main{flex:1;overflow-y:auto;padding:14px 14px 90px;}
  .view{display:none;animation:fade .25s;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2.sec{font-size:14px;color:var(--sub);margin:6px 4px 10px;font-weight:600;}

  /* 物品卡 */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .item{background:var(--card);border-radius:18px;padding:12px;position:relative;
    box-shadow:0 4px 14px rgba(120,110,100,.08);cursor:pointer;transition:transform .12s;}
  .item:active{transform:scale(.97);}
  .item .emo{font-size:26px;}
  .item .nm{font-size:13px;font-weight:600;margin-top:4px;line-height:1.3;}
  .item .tag{display:inline-block;font-size:10px;color:#fff;background:var(--sub);
    border-radius:6px;padding:1px 6px;margin-top:6px;}
  .item .pool{display:inline-block;font-size:10px;color:var(--brand2);font-weight:600;margin-top:6px;margin-left:6px;vertical-align:middle;}
  .add-card{border:2px dashed var(--brand);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--brand);cursor:pointer;}
  .add-card .emo{font-size:24px;} .add-card .nm{color:var(--brand);margin-top:4px;}
  .fresh-note{grid-column:1/-1;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;
    border-radius:14px;padding:11px 13px;font-size:12px;line-height:1.5;box-shadow:0 4px 14px rgba(120,110,100,.12);}
  .badge{position:absolute;top:8px;right:8px;font-size:9px;padding:2px 6px;border-radius:8px;color:#fff;}
  .b-both{background:var(--green);} .b-reminder{background:var(--accent);} .b-record{background:var(--sub);}

  /* 轮盘 */
  .wheel-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .pools{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:7px 14px;font-size:12px;cursor:pointer;}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand);}
  .wheel-box{position:relative;width:300px;height:300px;margin-top:6px;}
  #wheel{transition:transform 4s cubic-bezier(.17,.67,.25,1);border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.15);}
  .pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);
    width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;
    border-top:20px solid var(--ink);z-index:3;filter:drop-shadow(0 2px 2px rgba(0,0,0,.2));}
  .hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:68px;height:68px;border-radius:50%;background:#fff;z-index:4;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 4px 16px rgba(120,110,100,.22);border:3px solid var(--brand2);
    transition:transform .12s;}
  .hub:active{transform:translate(-50%,-50%) scale(.92);}
  .hub .hg{font-size:19px;font-weight:800;color:var(--brand);line-height:1;font-family:'江西拙楷','KaiTi',cursive;}
  .hub .hs{font-size:9px;color:var(--sub);margin-top:3px;letter-spacing:1px;}
  .spin-btn{background:var(--brand);color:#fff;border:none;border-radius:28px;
    padding:12px 36px;font-size:15px;font-weight:600;box-shadow:0 4px 12px rgba(232,160,160,.5);}
  .spin-btn:disabled{opacity:.5;}

  /* 时间线 / 日常 routine */
  .timeline{padding:4px 0 0 6px;}
  .ctime{position:relative;padding:0 0 18px 24px;}
  .ctime:before{content:'';position:absolute;left:6px;top:10px;bottom:0;width:2px;background:var(--line);}
  .ctime:last-child:before{display:none;}
  .ctime .dot{position:absolute;left:0;top:4px;width:14px;height:14px;border-radius:50%;
    background:var(--brand);box-shadow:0 0 0 4px var(--bg);}
  .ctime.eve .dot{background:var(--brand2);} .ctime.any .dot{background:var(--accent);}
  .ctime .tl{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px;}
  .titem{display:inline-flex;align-items:center;gap:6px;background:var(--card);
    border-radius:14px;padding:7px 11px;margin:0 7px 8px 0;cursor:pointer;
    box-shadow:0 3px 10px rgba(120,110,100,.08);transition:transform .12s;}
  .titem:active{transform:scale(.95);}
  .titem .te{font-size:17px;} .titem .tn{font-size:12px;color:var(--ink);}

  /* 提醒 */
  .rem{background:var(--card);border-radius:14px;padding:12px;margin-bottom:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;align-items:center;gap:10px;}
  .rem .ico{font-size:20px;}
  .rem .body{flex:1;}
  .rem .body .t{font-size:13px;font-weight:600;}
  .rem .body .f{font-size:11px;color:var(--sub);margin-top:2px;}
  .rem .do{font-size:11px;color:#fff;background:var(--green);border:none;
    border-radius:10px;padding:6px 10px;}
  .rem .done{background:var(--line);color:var(--sub);}

  /* 记录 */
  .rec-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.04);}
  .rec-card .d{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;font-weight:600;margin-bottom:6px;}
  .rec-count{display:inline-block;margin-left:6px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    color:#fff;font-size:11px;font-weight:600;border-radius:10px;padding:2px 9px;vertical-align:middle;
    box-shadow:0 2px 6px rgba(120,110,100,.12);}
  .rec-card .pill{display:inline-block;background:var(--bg);border-radius:8px;
    font-size:11px;padding:3px 8px;margin:3px 4px 0 0;}
  .week-stat{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;
    border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 4px 14px rgba(120,110,100,.14);}
  .week-stat .ws-h{font-size:12px;opacity:.9;margin-bottom:6px;}
  .week-stat .ws-main{font-size:17px;font-weight:700;}
  .week-stat .ws-main b{font-size:26px;margin:0 2px;}
  .week-stat .ws-sub{font-size:11px;opacity:.92;margin-top:6px;}

  /* 新增表单 */
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--sub);margin-bottom:5px;}
  .field input,.field textarea,.field select{width:100%;border:1px solid var(--line);
    border-radius:10px;padding:10px;font-size:14px;background:#fff;font-family:inherit;}
  .field textarea{resize:vertical;min-height:60px;}
  .btn{width:100%;background:var(--brand2);color:#fff;border:none;border-radius:18px;
    padding:13px;font-size:15px;font-weight:600;}
  .ai-out{background:#fff;border:1px dashed var(--brand2);border-radius:12px;
    padding:12px;margin-top:10px;font-size:13px;display:none;}
  .ai-out h4{margin:0 0 8px;font-size:13px;color:var(--brand2);}
  .ai-out .row{margin:4px 0;font-size:12px;}
  .ai-out .row b{color:var(--ink);}
  .emoji-row{display:flex;align-items:center;gap:10px;margin-top:2px;}
  .emoji-preview{font-size:30px;width:48px;height:48px;flex:0 0 48px;display:flex;
    align-items:center;justify-content:center;background:#fff;border:1px solid var(--line);
    border-radius:12px;}
  .emoji-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;max-height:132px;overflow-y:auto;}
  .emoji-picker button{font-size:20px;width:40px;height:40px;border:1px solid var(--line);
    background:#fff;border-radius:10px;cursor:pointer;line-height:1;}
  .emoji-picker button:active{transform:scale(.9);}

  /* 底部导航 */
  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:420px;background:#fff;border-top:1px solid var(--line);
    display:flex;}
  nav .tab{flex:1;text-align:center;padding:9px 0;font-size:10px;color:var(--sub);
    cursor:pointer;}
  nav .tab .ic{font-size:20px;display:block;}
  nav .tab.on{color:var(--brand);}

  /* 弹窗 */
  .mask{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;
    align-items:flex-end;justify-content:center;z-index:10;}
  .mask.show{display:flex;}
  .sheet{width:100%;max-width:420px;background:var(--bg);border-radius:20px 20px 0 0;
    padding:18px;max-height:82vh;overflow-y:auto;animation:up .25s;}
  @keyframes up{from{transform:translateY(100%)}to{transform:none}}
  .sheet h3{margin:0 0 4px;font-size:18px;}
  .sheet .meta{font-size:12px;color:var(--sub);margin-bottom:12px;}
  .blk{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;}
  .blk .h{font-size:12px;color:var(--brand2);font-weight:600;margin-bottom:6px;}
  .blk .s{font-size:13px;line-height:1.6;}
  .sheet .acts{display:flex;gap:10px;margin-top:6px;}
  .sheet .acts button{flex:1;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;}
  .act-use{background:var(--green);color:#fff;} .act-close{background:var(--line);color:var(--ink);}
  .act-edit{background:var(--brand2);color:#fff;}
  .act-save{background:var(--green);color:#fff;}
  .act-del{flex:1;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;
    background:#E8C4C0;color:#9E4740;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;
    opacity:0;transition:opacity .3s;z-index:20;pointer-events:none;}
  .toast.show{opacity:.95;}

  /* 分享按钮 + 分享面板 */
  .share-btn{display:block;margin:14px auto 0;background:#fff;color:var(--ink);
    border:1.5px solid rgba(255,255,255,.7);border-radius:22px;padding:10px 20px;
    font-size:13.5px;font-family:inherit;font-weight:600;cursor:pointer;
    box-shadow:0 3px 10px rgba(120,110,100,.18);}
  .share-btn:active{transform:translateY(1px);}
  .qr-box{display:flex;justify-content:center;margin:10px 0 4px;}
  .qr-img{width:180px;height:180px;background:#fff;border-radius:12px;padding:8px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .share-link{font-size:12.5px;word-break:break-all;background:rgba(120,110,100,.08);
    border-radius:10px;padding:9px 11px;color:var(--ink);line-height:1.5;}
</style>
</head>
<body>
<div class="phone">
  <header>
    <h1>用起来 🌿</h1>
    <p>把闲置物品，重新拉回生活流 · v1.6</p>
    <div class="stats">
      <div class="stat"><b id="st-items">0</b><span>物品总数</span></div>
      <div class="stat"><b id="st-used">0</b><span>已盘活</span></div>
      <div class="stat"><b id="st-streak">0</b><span>连续天数</span></div>
    </div>
    
  </header>

  <main>
    <!-- 物品库 -->
    <section class="view" id="v-lib">
      <h2 class="sec">我的物品库（点击看场景分析）</h2>
      <div class="grid" id="lib-grid"></div>
      <div class="add-wrap" id="add-wrap" style="display:none;margin-top:14px;">
        <h2 class="sec">新增物品 → 自动场景分析 → 分配通道</h2>
        <div class="field">
          <label>物品名称 *</label>
          <input id="add-name" placeholder="例如：颈部按摩仪">
        </div>
        <div class="field">
          <label>物品图标（可自定义 emoji）</label>
          <div class="emoji-row">
            <div class="emoji-preview" id="emoji-preview">📦</div>
            <input id="add-emoji" placeholder="点下方选，或粘贴任意 emoji" style="flex:1;">
          </div>
          <div class="emoji-picker" id="emoji-picker"></div>
        </div>
        <div class="field">
          <label>品牌 / 备注（可选）</label>
          <input id="add-brand" placeholder="例如：真不二">
        </div>
        <div class="field">
          <label>当前状态（可选）</label>
          <input id="add-status" placeholder="例如：一个月用一两次">
        </div>
        <button class="btn" id="add-btn">✨ 智能场景分析</button>
        <div class="ai-out" id="ai-out"></div>
        <div class="field" id="assign-box" style="display:none;margin-top:12px;">
          <label>分配到哪个通道</label>
          <select id="add-channel">
            <option value="both">每日提醒 + 轮盘抽签</option>
            <option value="reminder">仅每日提醒（不进轮盘）</option>
            <option value="record">仅记录（容器/枢纽类）</option>
          </select>
          <button class="btn" id="save-btn" style="margin-top:10px;background:var(--green);">✓ 添加到物品库</button>
        </div>
      </div>
    </section>

    <!-- 轮盘抽签 -->
    <section class="view" id="v-wheel">
      <h2 class="sec">无聊了？点中间 GO 抽一个，抽到哪个用哪个</h2>
      <div class="wheel-wrap">
        <div class="pools" id="pool-chips"></div>
        <div class="wheel-box">
          <div class="pointer"></div>
          <canvas id="wheel" width="300" height="300"></canvas>
          <div class="hub" id="hub"><span class="hg">GO</span><span class="hs">点我抽</span></div>
        </div>
        <button class="spin-btn" id="spin">🎯 转一次</button>
      </div>
    </section>

    <!-- 日常提醒 -->
    <section class="view" id="v-rem">
      <h2 class="sec">今日提醒（已融入日常的会自动降级）</h2>
      <div id="rem-list"></div>
    </section>

    <!-- 使用记录 -->
    <section class="view" id="v-rec">
      <h2 class="sec">使用记录 · 盘活成就感</h2>
      <div id="rec-list"></div>
    </section>

    <!-- 日常时间线 -->
    <section class="view active" id="v-time">
      <h2 class="sec">把物品嵌进一天 · 按时间线融入 routine</h2>
      <div class="timeline" id="time-list"></div>
    </section>
  </main>

  <nav id="nav">
    <div class="tab on" data-v="v-time"><span class="ic">🕐</span>日常</div>
    <div class="tab" data-v="v-lib"><span class="ic">📦</span>物品库</div>
    <div class="tab" data-v="v-wheel"><span class="ic">🎡</span>轮盘</div>
    <div class="tab" data-v="v-rem"><span class="ic">⏰</span>提醒</div>
    <div class="tab" data-v="v-rec"><span class="ic">✅</span>记录</div>
  </nav>
</div>

<div class="mask" id="mask">
  <div class="sheet" id="sheet"></div>
</div>
<div class="toast" id="toast"></div>

<script>
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//
// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php

// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html
//
//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }

/* ============ 分享给朋友（二维码 + 复制链接） ============ */
function shareURL(){
  let base=location.origin+location.pathname;
  base=base.replace(/index\.html(\?.*)?$/,'');
  if(!base.endsWith('/'))base+='/';
  return base+'#fresh';
}
function fallbackCopy(url,done){
  const ta=document.createElement('textarea');ta.value=url;
  ta.style.position='fixed';ta.style.top='-9999px';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');done();}catch(e){toast('请长按手动复制链接');}
  document.body.removeChild(ta);
}
function copyShare(url){
  const done=()=>toast('已复制链接 ✓ 去微信发给朋友');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done).catch(()=>fallbackCopy(url,done));
  }else fallbackCopy(url,done);
}
function openShare(){
  const url=shareURL();
  let qrImg='';
  try{
    const qr=qrcode(0,'M');qr.addData(url);qr.make();
    qrImg=qr.createDataURL(8,6);
  }catch(e){ qrImg=''; }
  $('#sheet').innerHTML=`
    <h3>📤 分享给朋友</h3>
    <div class="meta">朋友打开只看到「大疆相机」示例，自己加闲置——数据互不串，不影响你。</div>

    <div class="meta" style="text-align:center;margin:2px 0 8px;">微信 / 手机扫码，或点下方复制链接</div>
    <div class="share-link" id="share-link">${url}</div>

      <button class="act-use" id="copy-btn">📋 复制链接</button>
      <button class="act-close" onclick="closeSheet()">关闭</button>

}

function deleteItem(id){
  const it=items.find(x=>x.id===id);if(!it)return;
  if(!confirm('确定删除「'+it.name+'」吗？\n删除后将从物品库、轮盘、提醒、记录中移除，且不可撤销。'))return;
  const ai=added.findIndex(x=>x.id===id);
  if(ai>=0){added.splice(ai,1);localStorage.setItem('added',JSON.stringify(added));}
  else if(!deleted.includes(id)){deleted.push(id);localStorage.setItem('deleted',JSON.stringify(deleted));}

  closeSheet();renderLib();buildPoolChips();drawWheel();renderRem();renderRec();renderTime();
  toast('已删除「'+it.name+'」');
}

/* ============ 轮盘抽签 ============ */
let curPool='all';let curItems=[];let deg=0;
const PALETTE=['rgba(174,191,187,.5)','rgba(184,194,203,.5)','rgba(197,193,201,.5)','rgba(169,190,196,.5)'];
const wheel=$('#wheel');const wctx=wheel.getContext('2d');

function buildPoolChips(){
  const wrap=$('#pool-chips');
  const opts=[['all','全部可抽签'],['play','🎲 随手玩'],['care','💆 护理夜'],['write','✍️ 书写流'],['move','💪 动起来']];
  wrap.innerHTML='';
  opts.forEach(([k,t])=>{
    const c=document.createElement('div');c.className='chip'+(k===curPool?' on':'');
    c.textContent=t;c.onclick=()=>{curPool=k;buildPoolChips();drawWheel();};
    wrap.appendChild(c);
  });
}
function lotteryItems(){
  return items.filter(it=>it.channel==='both'&&it.pool&&(curPool==='all'||it.pool===curPool));
}
function drawWheel(){
  curItems=lotteryItems();
  const N=curItems.length;const cx=150,cy=150,r=140;
  wctx.clearRect(0,0,300,300);
  if(N===0){wctx.fillStyle='#ccc';wctx.font='14px sans-serif';wctx.textAlign='center';
    wctx.fillText('该池暂无可抽签物品',150,150);return;}
  const step=2*Math.PI/N;
  curItems.forEach((it,i)=>{
    const a0=-Math.PI/2+i*step,a1=a0+step;
    wctx.beginPath();wctx.moveTo(cx,cy);wctx.arc(cx,cy,r,a0,a1);wctx.closePath();
    wctx.fillStyle=PALETTE[i%PALETTE.length];wctx.fill();
    const mid=a0+step/2;
    const label=(SHORT[it.id]||it.name.replace(/^真不二 /,'')).slice(0,6);
    wctx.save();wctx.translate(cx,cy);wctx.rotate(mid);
    const flip=Math.sin(mid)>0;
    if(flip)wctx.rotate(Math.PI);
    wctx.fillStyle='rgba(74,62,55,.92)';
    wctx.font="15px '江西拙楷','KaiTi','STKaiti',cursive";
    wctx.textBaseline='middle';
    const rad=r-18;
    if(flip){wctx.textAlign='left';wctx.fillText(label,-rad,0);}
    else{wctx.textAlign='right';wctx.fillText(label,rad,0);}
    wctx.restore();
  });
  deg=0;wheel.style.transition='none';wheel.style.transform='rotate(0deg)';
}
let spinning=false;
function doSpin(){
  if(spinning)return;
  if(curItems.length===0){toast('该池没有可抽签物品');return;}
  spinning=true;
  const N=curItems.length,step=2*Math.PI/N;
  const winner=Math.floor(Math.random()*N);
  // 目标绝对角（含 5 整圈），取模后即为最终落点位置
  const targetDeg=(((2*Math.PI*5-(winner*step+step/2))*180/Math.PI)%360+360)%360;
  // 相对当前角度再转满至少 5 圈，保证每次转速一致
  let td=deg+360*5;
  // 把当前落点对齐到中奖位置（mod 360）
  const curMod=((td%360)+360)%360;
  td+=((targetDeg-curMod)%360+360)%360;
  deg=td;
  wheel.style.transition='transform 4s cubic-bezier(.17,.67,.25,1)';
  wheel.style.transform=`rotate(${deg}deg)`;
  setTimeout(()=>{showSpin(curItems[winner]);spinning=false;},4100);
}
$('#spin').addEventListener('click',doSpin);
$('#hub').addEventListener('click',doSpin);

/* ============ 使用记录 ============ */
function streak(){
  if(checkins.length===0)return 0;
  const days=[...new Set(checkins.map(c=>c.date))].sort();
  let s=days.includes(todayStr())?0:1; // 今天没记录则从最后一天往前
  let cur=days[days.length-1];
  let count=0;
  for(let i=days.length-1;i>=0;i--){
    if(i===days.length-1){count=1;cur=days[i];continue;}
    const prev=days[i];
    const diff=(new Date(cur)-new Date(prev))/86400000;
    if(diff===1){count++;cur=prev;}else break;
  }
  return count;
}
function renderRec(){
  const list=$('#rec-list');list.innerHTML='';
  // ===== 每周盘点（周一到周日）=====
  const md=s=>{const p=s.split('-');return (+p[1])+'/'+(+p[2]);};
  const mondayOf=s=>{const dt=new Date(s+'T00:00:00Z');const day=(dt.getUTCDay()+6)%7;dt.setUTCDate(dt.getUTCDate()-day);return dt.toISOString().slice(0,10);};
  const addDays=(s,n)=>{const dt=new Date(s+'T00:00:00Z');dt.setUTCDate(dt.getUTCDate()+n);return dt.toISOString().slice(0,10);};
  const t=todayStr();
  const ws=mondayOf(t), we=addDays(ws,6);
  const ls=addDays(ws,-7), le=addDays(ws,-1);
  const cnt=(a,b)=>{const ids=new Set();checkins.forEach(c=>{if(c.date>=a&&c.date<=b)ids.add(c.id);});return ids.size;};
  const dayCnt=(a,b)=>{const ds=new Set();checkins.forEach(c=>{if(c.date>=a&&c.date<=b)ds.add(c.date);});return ds.size;};
  const n=cnt(ws,we), ln=cnt(ls,le), dactive=dayCnt(ws,we);
  const wc=document.createElement('div');wc.className='week-stat';
  wc.innerHTML=`<div class="ws-h">📊 本周盘点（${md(ws)}–${md(we)}）</div>
    <div class="ws-main">本周盘活 <b>${n}</b> 样物品 🌟</div>
    <div class="ws-sub">上周 ${ln} 样 · 本周已活跃 ${dactive} 天</div>`;
  list.appendChild(wc);
  // ===== 每日记录 =====
  const byDate={};
  checkins.forEach(c=>{(byDate[c.date]=byDate[c.date]||[]).push(c.id);});
  const dates=Object.keys(byDate).sort().reverse();
  if(dates.length===0){
    const p=document.createElement('p');p.style.cssText='color:var(--sub);font-size:13px;margin-top:6px;';
    p.textContent='还没有每日记录，去物品库点「标记今天用了」试试 👀';
    list.appendChild(p);return;
  }
  dates.forEach(dt=>{
    const ids=byDate[dt];
    const names=ids.map(id=>items.find(x=>x.id===id)?.name||'物品').join('、');
    const n2=ids.length, isToday=dt===todayStr();
    const label=isToday?`盘活 ${n2} 件，我真棒！🌟`:`盘活 ${n2} 件 🌿`;
    const d=document.createElement('div');d.className='rec-card';
    d.innerHTML=`<div class="d"><span>${dt}　${isToday?'（今天）':''}</span><span class="rec-count">${label}</span></div>
      <div><span class="pill">${names}</span></div>`;
    list.appendChild(d);
  });
}

/* ============ 新增物品 + 场景分析 ============ */
function analyze(name){
  const n=name.toLowerCase();
  let pool='care',channel='both';
  if(/笔|本|印|写|书|kindle|单词|诗|卡/.test(name))pool='write';
  else if(/哑铃|球|瑜伽|运动|拍|跑步/.test(name))pool='move';
  else if(/相机|音箱|棋|骰|游戏|玩具/.test(name))pool='play';
  else if(/包|盒|箱|架|收纳/.test(name)){pool=null;channel='record';}
  else if(/贴|膏|灸|热敷|泡脚|面膜|护肤|面部|美容|胶原|脱毛|去角|润目/.test(name)){pool='care';channel='both';}
  const scenesPool={
    write:['日常随手记录','结合手账/计划本','碎片时间书写'],
    move:['居家跟练','办公间隙活动','周末户外'],
    play:['无聊时随手玩','聚会破冰','亲子互动'],
    care:['晚间护肤/放松','周末集中护理','结合已有养生流程'],
    record:['日常出门常备','收纳归类','作为其他物品的容器']
  };
  const sc=scenesPool[pool||'record'];
  const freq=channel==='reminder'?'每周 2–3 次':pool==='move'?'每周 3–4 次':pool==='write'?'每天 10 分':pool==='play'?'每周 1 次':'每周 2–3 次';
  const action=channel==='record'?`把「${name}」当日常容器，高频小物常驻其中。`
    :`把「${name}」放在显眼处，绑定一个你已有的日常动作（习惯叠加）。`;
  return {pool,channel,scenes:sc,freq,action};
}

$('#save-btn').addEventListener('click',()=>{
  const name=$('#add-name').value.trim();if(!name)return;
  const a=JSON.parse($('#ai-out').dataset.an);
  const id=Math.max(0,...items.map(i=>i.id))+1;
  const cat=/笔|本|印|写|书|卡/.test(name)?'文具':/相机|音箱|手机|表|仪/.test(name)?'数码':/哑铃|球|瑜伽|拍/.test(name)?'运动':'养生';
  const emoji=$('#add-emoji').value.trim();
  items.push({id,name,cat,brand:$('#add-brand').value.trim(),status:$('#add-status').value.trim()||'新增',
    emoji:emoji||undefined,freq:a.freq,pool:a.pool,channel:$('#add-channel').value,scenes:a.scenes,action:a.action});
  if($('#add-channel').value!=='record'){
    added.push(items[items.length-1]);localStorage.setItem('added',JSON.stringify(added));
  }
  toast('已添加 ✓');
  $('#add-name').value='';$('#add-brand').value='';$('#add-status').value='';
  $('#add-emoji').value='';$('#emoji-preview').textContent='📦';
  $('#ai-out').style.display='none';$('#assign-box').style.display='none';
  renderLib();buildPoolChips();drawWheel();renderTime();
});

/* ============ 时间线 / 日常 routine ============ */
function itemSlots(it){
  const t=(it.name+' '+it.scenes.join(' ')+' '+it.action);
  const s=[];
  if(/晨|早餐|早起|起床|计划|咖啡|豆浆|晨间/.test(t))s.push('早晨');
  if(/午休|办公|午后|下午|工作|通勤|伏案|提神/.test(t))s.push('午后');
  if(/晚|睡前|追剧|夜|护肤|泡|面膜|阅读|泡脚|拉伸/.test(t))s.push('晚间');
  if(s.length===0||/周末|户外|运动|聚会|朋友|亲子|无聊|随时|按需|碎片|等车|排队|旅行|记录|放松|瑜伽|冥想|居家|跟练/.test(t))s.push('随时');
  return s;
}
function renderTime(){
  const order=[['早晨','☀️ 早晨 · 06–10'],['午后','🌤️ 午后 · 10–17'],['晚间','🌙 晚间 · 17–23'],['随时','⏳ 随时可融入']];
  const map={'早晨':[],'午后':[],'晚间':[],'随时':[]};
  items.forEach(it=>{ if(it.channel==='record')return; itemSlots(it).forEach(k=>map[k].push(it)); });
  const wrap=$('#time-list');wrap.innerHTML='';
  order.forEach(([key,label])=>{
    if(!map[key].length)return;
    const sec=document.createElement('div');
    sec.className='ctime'+(key==='晚间'?' eve':key==='随时'?' any':'');
    sec.innerHTML=`<span class="dot"></span><div class="tl">${label}</div>`;
    map[key].forEach(it=>{
      const c=document.createElement('div');c.className='titem';
      c.innerHTML=`<span class="te">${getEmoji(it)}</span><span class="tn">${it.name.replace(/^真不二 /,'')}</span>`;
      c.onclick=()=>openItem(it.id);
      sec.appendChild(c);
    });
    wrap.appendChild(sec);
  });
}

/* ============ 初始化 ============ */
renderLib();buildPoolChips();drawWheel();renderRem();renderRec();renderTime();
